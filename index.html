<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Centrála</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google API Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-gray-100 font-sans flex flex-col h-screen">

    <header class="bg-white shadow p-4 flex justify-between items-center">
        <h1 class="text-xl font-bold text-blue-600">Moje Centrála</h1>
        <div id="g_id_signin"></div> <!-- Tlačítko přihlášení -->
        <button id="signout_button" onclick="odhlasit()" class="hidden text-sm text-red-500">Odhlásit</button>
    </header>

    <div class="flex justify-center bg-white border-b">
        <button onclick="ukazSekci('gmail')" id="btn-gmail" class="px-6 py-3 font-bold text-blue-600 border-b-2 border-blue-600">GMAIL</button>
        <button onclick="ukazSekci('kalendar')" id="btn-kalendar" class="px-6 py-3 font-bold text-gray-500">KALENDÁŘ</button>
    </div>

    <main class="flex-1 overflow-y-auto p-4">
        <div id="sekce-gmail" class="block">
            <h2 class="font-semibold mb-2">Poslední zprávy:</h2>
            <div id="seznam-mailu" class="space-y-2 text-gray-500 italic">Přihlas se pro zobrazení mailů...</div>
        </div>

        <div id="sekce-kalendar" class="hidden text-center p-10 border-2 border-dashed rounded-lg bg-white">
            Tvůj kalendář se zobrazí zde.
        </div>

        <div id="text-hlasu" class="mt-6 p-4 bg-blue-100 text-blue-800 rounded-lg hidden italic"></div>
    </main>

    <footer class="bg-white p-4 border-t flex justify-center">
        <button id="btn-hlas" onclick="spustHlas()" class="bg-blue-600 text-white font-bold py-4 px-8 rounded-full shadow-lg">
            🎤 PŘIDAT HLASEM
        </button>
    </footer>

    <script>
        const CLIENT_ID = 414271395448-4fq029hqqb69tsflcsa3ltq6ae00ovc4.apps.googleusercontent.com;
        let accessToken = null;

        // Inicializace Google přihlášení
        window.onload = function () {
            google.accounts.id.initialize({
                client_id: CLIENT_ID,
                callback: handleCredentialResponse
            });
            google.accounts.id.renderButton(
                document.getElementById("g_id_signin"),
                { theme: "outline", size: "large" }
            );
        };

        function handleCredentialResponse(response) {
            // Získání povolení k datům (OAuth2)
            const client = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: 'https://www.googleapis.com/auth/gmail.readonly https://www.googleapis.com/auth/calendar.events',
                callback: (tokenResponse) => {
                    accessToken = tokenResponse.access_token;
                    document.getElementById("signout_button").classList.remove("hidden");
                    nactiMaily();
                },
            });
            client.requestAccessToken();
        }

        async function nactiMaily() {
            const response = await fetch('https://gmail.googleapis.com/gmail/v1/users/me/messages?maxResults=5', {
                headers: { 'Authorization': `Bearer ${accessToken}` }
            });
            const data = await response.json();
            const seznam = document.getElementById("seznam-mailu");
            seznam.innerHTML = "";
            
            if (data.messages) {
                seznam.classList.remove("italic");
                data.messages.forEach(msg => {
                    const div = document.createElement("div");
                    div.className = "bg-white p-3 rounded shadow border-l-4 border-blue-500";
                    div.innerText = "ID zprávy: " + msg.id; // Zatím jen ID, pak vylepšíme
                    seznam.appendChild(div);
                });
            }
        }

        function ukazSekci(sekce) {
            document.getElementById('sekce-gmail').classList.toggle('hidden', sekce !== 'gmail');
            document.getElementById('sekce-kalendar').classList.toggle('hidden', sekce !== 'kalendar');
        }

        function spustHlas() {
            const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
            const rec = new Speech();
            rec.lang = 'cs-CZ';
            rec.onstart = () => document.getElementById('btn-hlas').innerText = "POSLOUCHÁM...";
            rec.onresult = (e) => {
                const text = e.results[0][0].transcript;
                document.getElementById('text-hlasu').innerText = `Chceš uložit: ${text}`;
                document.getElementById('text-hlasu').classList.remove('hidden');
            };
            rec.onend = () => document.getElementById('btn-hlas').innerText = "🎤 PŘIDAT HLASEM";
            rec.start();
        }

        function odhlasit() {
            location.reload();
        }
    </script>
</body>
</html>
